name: Release Package Check

"on":
  pull_request:
    paths:
      - ".github/release-package-items.txt"
      - ".github/workflows/*.yml"
      - "manifest.json"
      - "*.html"
      - "*.js"
      - "*.css"
      - "assets/**"
      - "scripts/check-release-package.js"
  push:
    branches:
      - main
    paths:
      - ".github/release-package-items.txt"
      - ".github/workflows/*.yml"
      - "manifest.json"
      - "*.html"
      - "*.js"
      - "*.css"
      - "assets/**"
      - "scripts/check-release-package.js"

jobs:
  verify-release-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify release package manifest
        run: npm run check:release-package
